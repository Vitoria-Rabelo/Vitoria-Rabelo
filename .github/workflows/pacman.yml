name: Generate Pacman Contribution Graph

on:
  schedule:
    - cron: "0 */12 * * *" # a cada 12h
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: :contentReference[oaicite:0]{index=0}/snk@v3
        with:
          github_user_name: Vitoria-Rabelo
          outputs: |
            dist/pacman-contribution-graph.svg
            dist/pacman-contribution-graph-dark.svg?palette=github-dark

      - uses: :contentReference[oaicite:1]{index=1}/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
